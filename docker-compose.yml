services:
  api:
    image: ghcr.io/skalover32-a11y/vlf-chrome-proxy-api:${IMAGE_TAG:-main}
    build:
      context: ./backend
      target: api
    env_file:
      - ./.env
    restart: unless-stopped
    environment:
      SQLITE_PATH: /data/app.db
      NODE_CONFIG_PATH: /runtime/nodes.json
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    volumes:
      - ./deploy/data:/data
      - ./deploy/runtime:/runtime

  https-proxy:
    image: ghcr.io/skalover32-a11y/vlf-chrome-proxy-https-proxy:${IMAGE_TAG:-main}
    build:
      context: ./backend
      target: https-proxyd
    env_file:
      - ./.env
    restart: unless-stopped
    environment:
      SQLITE_PATH: /data/app.db
      NODE_CONFIG_PATH: /runtime/nodes.json
    ports:
      - "${HTTPS_PROXY_PORT:-1443}:443"
    volumes:
      - ./deploy/data:/data
      - ./deploy/runtime:/runtime

  admin:
    image: ghcr.io/skalover32-a11y/vlf-chrome-proxy-admin:${IMAGE_TAG:-main}
    build:
      context: ./backend
      target: admin
    env_file:
      - ./.env
    profiles:
      - tools
    environment:
      SQLITE_PATH: /data/app.db
      NODE_CONFIG_PATH: /runtime/nodes.json
    volumes:
      - ./deploy/data:/data
      - ./deploy/runtime:/runtime
